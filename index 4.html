<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Jettison</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;background:#060e1e;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,sans-serif;}
.show{width:100vw;height:100vh;position:relative;}
.slide{position:absolute;inset:0;opacity:0;transition:opacity 1s ease;display:flex;align-items:center;justify-content:center;background:#060e1e;}
.slide.active{opacity:1;}
.slide img{max-width:100%;max-height:100%;object-fit:contain;}
.qr-slide{flex-direction:column;gap:1.5rem;text-align:center;padding:2rem;}
.qt{font-size:clamp(22px,4vw,48px);font-weight:700;color:#fff;line-height:1.2;}
.qt span{color:#1dbf8a;}
.qs{font-size:clamp(12px,1.8vw,20px);color:#7aa8c8;}
.qr-wrap{background:white;border-radius:16px;padding:18px;display:inline-block;}
.qr-wrap img{width:clamp(140px,20vw,240px);height:clamp(140px,20vw,240px);display:block;}
.qc{font-size:clamp(13px,2vw,22px);font-weight:600;color:#1dbf8a;}
.qu{font-size:clamp(10px,1.4vw,16px);color:#7aa8c8;margin-top:4px;}
.bar{position:fixed;bottom:0;left:0;height:4px;background:#1dbf8a;z-index:100;}
.dots{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);display:flex;gap:8px;z-index:100;}
.dot{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,0.25);cursor:pointer;transition:all 0.3s;}
.dot.on{background:#1dbf8a;transform:scale(1.3);}
.ctrl{position:fixed;top:12px;right:12px;display:flex;gap:6px;z-index:100;}
.btn{background:rgba(255,255,255,0.12);border:1px solid rgba(255,255,255,0.2);color:white;border-radius:8px;padding:6px 14px;font-size:13px;cursor:pointer;}
.num{position:fixed;top:12px;left:12px;background:rgba(0,0,0,0.5);color:rgba(255,255,255,0.5);font-size:11px;padding:4px 10px;border-radius:16px;z-index:100;}
</style>

<div class="ctrl">

<div class="num" id="num">1 / 8</div>
<script>
var slides=document.querySelectorAll('.slide'),
    dots=document.getElementById('dots'),
    bar=document.getElementById('bar'),
    num=document.getElementById('num'),
    cur=0,paused=false,elapsed=0,DUR=6000;
for(var i=0;i<slides.length;i++){
  var d=document.createElement('div');
  d.className='dot'+(i===0?' on':'');
  d.setAttribute('data-i',i);
  d.onclick=function(){goTo(parseInt(this.getAttribute('data-i')));};
  dots.appendChild(d);
}
function goTo(n){
  slides[cur].classList.remove('active');
  dots.children[cur].classList.remove('on');
  cur=(n+slides.length)%slides.length;
  slides[cur].classList.add('active');
  dots.children[cur].classList.add('on');
  num.textContent=(cur+1)+' / '+slides.length;
  elapsed=0;
  bar.style.width='0%';
}
setInterval(function(){
  if(paused)return;
  elapsed+=100;
  bar.style.width=(elapsed/DUR*100)+'%';
  if(elapsed>=DUR)goTo(cur+1);
},100);
document.getElementById('pause').onclick=function(){paused=!paused;this.textContent=paused?'Play':'Pause';};
document.getElementById('prev').onclick=function(){goTo(cur-1);};
document.getElementById('next').onclick=function(){goTo(cur+1);};
document.addEventListener('keydown',function(e){
  if(e.key==='ArrowRight')goTo(cur+1);
  if(e.key==='ArrowLeft')goTo(cur-1);
});
</script>
